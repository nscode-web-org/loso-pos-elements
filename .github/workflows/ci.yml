name: CI

# Typecheck, test, and build on every push to main and every pull request,
# across the Node versions the package claims to support (engines: >=20.19).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Packs the tarball and typechecks ESM + CJS consumers against it, across
      # both entries (`.` and `./define`). The steps above all pass while the
      # published package is unusable, so this is the only one that covers the
      # exports map and the .d.ts/.d.cts split.
      - run: npm run test:package-types
