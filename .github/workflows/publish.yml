name: Publish

# Publishes to npm when you push a version tag, e.g. `v0.1.1`.
# The tag is only a trigger — npm publishes whatever version is in package.json,
# so the job first checks the two agree to avoid a confusing "already published" error.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing (and provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          # Trusted publishing needs Node >= 22.14.0.
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          # Disabled for release builds so the publish never runs against a
          # restored cache.
          package-manager-cache: false

      # Node 22 ships npm 10.x; trusted publishing needs npm >= 11.5.1.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Verify the tag matches package.json
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG. Bump the version first."
            exit 1
          fi

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # No NODE_AUTH_TOKEN: npm authenticates via the OIDC token from the
      # id-token permission above, against the trusted publisher configured on
      # npmjs.com for this package. Provenance is attached automatically, so
      # --provenance is not passed.
      - name: Publish to npm
        run: npm publish --access public
